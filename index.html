<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Africa </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            font-size: 14px;
        }
        /* ===== APP SHELL ===== */
        
        .app-bar {
            background: #1a1a2e;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }
        
        .app-bar img {
            height: 34px;
            border-radius: 4px;
            background: #fff;
            padding: 3px;
        }
        
        .app-bar h1 {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.2px;
        }
        
        .app-bar h1 em {
            color: #FFD700;
            font-style: normal;
        }
        
        .app-bar .spacer {
            flex: 1;
        }
        
        .app-bar .tagline {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }
        /* ===== LAYOUT ===== */
        
        .workspace {
            max-width: 1300px;
            margin: 28px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 28px;
            align-items: start;
        }
        /* ===== FORM PANEL ===== */
        
        .form-panel {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            position: sticky;
            top: 84px;
        }
        
        .form-panel-header {
            background: #1a1a2e;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-panel-header h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        
        .form-panel-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FFD700;
        }
        
        .form-body {
            padding: 22px 24px 24px;
        }
        
        .field-group {
            margin-bottom: 14px;
        }
        
        .field-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: #8892a4;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 5px;
        }
        
        .field-group input {
            width: 100%;
            border: 1.5px solid #e5e9f0;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.88rem;
            font-family: inherit;
            color: #1a1a2e;
            background: #fafbfc;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        
        .field-group input:focus {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.12);
            background: #fff;
        }
        
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 14px;
        }
        
        .section-divider span {
            font-size: 0.72rem;
            font-weight: 700;
            color: #8892a4;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            white-space: nowrap;
        }
        
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #edf0f7;
        }
        /* Line items */
        
        .item-header-row {
            display: grid;
            grid-template-columns: 1fr 52px 88px 28px;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .item-header-row span {
            font-size: 0.68rem;
            font-weight: 700;
            color: #aab2c0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 2px;
        }
        
        .line-items-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .line-item {
            display: grid;
            grid-template-columns: 1fr 52px 88px 28px;
            gap: 6px;
            align-items: center;
        }
        
        .line-item input {
            border: 1.5px solid #e5e9f0;
            border-radius: 7px;
            padding: 8px 10px;
            font-size: 0.85rem;
            font-family: inherit;
            color: #1a1a2e;
            background: #fafbfc;
            outline: none;
            transition: border-color 0.18s;
            width: 100%;
        }
        
        .line-item input:focus {
            border-color: #FFD700;
            background: #fff;
        }
        
        .remove-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccd0db;
            font-size: 1.1rem;
            transition: background 0.15s, color 0.15s;
        }
        
        .remove-btn:hover {
            background: #fee;
            color: #e63946;
        }
        
        .add-row-btn {
            margin-top: 10px;
            width: 100%;
            padding: 9px;
            border: 1.5px dashed #dde2ec;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            color: #8892a4;
            transition: all 0.18s;
        }
        
        .add-row-btn:hover {
            border-color: #FFD700;
            color: #5a6070;
            background: #fffdf0;
        }
        
        .gen-btn {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: #1a1a2e;
            color: #FFD700;
            border: none;
            border-radius: 9px;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.18s, transform 0.1s;
        }
        
        .gen-btn:hover {
            background: #0d0d1a;
        }
        
        .gen-btn:active {
            transform: scale(0.99);
        }
        /* ===== PREVIEW PANEL ===== */
        
        .preview-panel {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }
        
        .preview-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: #fafbfc;
            border-bottom: 1px solid #edf0f7;
        }
        
        .preview-bar h2 {
            font-size: 0.88rem;
            font-weight: 700;
            color: #5a6070;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .preview-bar h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: 0.4
            }
        }
        
        .dl-btn {
            background: #e63946;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 9px 20px;
            font-size: 0.83rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.18s;
        }
        
        .dl-btn:hover {
            background: #c1121f;
        }
        
        .dl-btn:disabled {
            background: #d0d4de;
            cursor: not-allowed;
        }
        
        .preview-canvas {
            padding: 24px;
            background: #e8ebf0;
            min-height: 500px;
        }
        /* ===== EMPTY STATE ===== */
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            color: #c0c8d8;
            text-align: center;
            gap: 14px;
        }
        
        .empty-state svg {
            opacity: 0.35;
        }
        
        .empty-state p {
            font-size: 0.9rem;
            line-height: 1.6;
        }
        /* ===== INVOICE DOCUMENT ===== */
        
        .invoice-doc {
            width: 100%;
            max-width: 794px;
            margin: 0 auto;
            background: #fff;
            font-family: 'Inter', Arial, sans-serif;
            font-size: 12.5px;
            color: #1a1a2e;
            position: relative;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        }
        
        .inv-hdr {
            width: 100%;
            display: block;
        }
        
        .inv-hdr img {
            width: 100%;
            display: block;
        }
        
        .inv-body-wrap {
            padding: 30px 44px 24px;
            position: relative;
        }
        /* Watermark */
        
        .inv-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            opacity: 0.055;
            pointer-events: none;
            z-index: 0;
            border-radius: 0;
        }
        
        .inv-content {
            position: relative;
            z-index: 1;
        }
        /* Meta row */
        
        .inv-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 26px;
            padding-bottom: 22px;
            border-bottom: 2px solid #f0f2f7;
        }
        
        .inv-to p {
            margin-bottom: 2px;
            color: #7a8499;
            font-size: 12px;
        }
        
        .inv-to .client-name {
            font-size: 17px;
            font-weight: 800;
            color: #1a1a2e;
            margin: 4px 0 3px;
        }
        
        .inv-to .client-loc {
            font-size: 12.5px;
            color: #5a6070;
        }
        
        .inv-ref-block {
            text-align: right;
        }
        
        .inv-ref-block .inv-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8892a4;
            margin-bottom: 8px;
        }
        
        .inv-ref-table {
            border-collapse: collapse;
            margin-left: auto;
        }
        
        .inv-ref-table td {
            padding: 3px 8px;
            font-size: 12.5px;
            vertical-align: middle;
        }
        
        .inv-ref-table td:first-child {
            color: #8892a4;
            font-weight: 500;
            text-align: right;
            white-space: nowrap;
        }
        
        .inv-ref-table td:last-child {
            font-weight: 700;
            color: #1a1a2e;
            text-align: right;
        }
        /* Items table */
        
        .inv-items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }
        
        .inv-items-table thead tr {
            background: #1a1a2e;
        }
        
        .inv-items-table thead th {
            padding: 11px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #fff;
            text-align: left;
        }
        
        .inv-items-table thead th.r {
            text-align: right;
        }
        
        .inv-items-table tbody tr {
            border-bottom: 1px solid #f0f2f7;
        }
        
        .inv-items-table tbody tr:nth-child(even) {
            background: #fafbfc;
        }
        
        .inv-items-table tbody td {
            padding: 11px 14px;
            font-size: 12.5px;
            color: #2d3450;
            vertical-align: top;
        }
        
        .inv-items-table tbody td.r {
            text-align: right;
            white-space: nowrap;
        }
        
        .inv-items-table tbody td.desc {
            max-width: 340px;
        }
        /* Totals */
        
        .inv-totals-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 1px;
        }
        
        .inv-totals-inner {
            min-width: 280px;
            border: 1px solid #edf0f7;
            border-top: none;
        }
        
        .totals-line {
            display: flex;
            justify-content: space-between;
            padding: 9px 16px;
            font-size: 12.5px;
            border-bottom: 1px solid #f0f2f7;
        }
        
        .totals-line .lbl {
            color: #7a8499;
            font-weight: 500;
        }
        
        .totals-line .val {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .totals-line.grand {
            background: #1a1a2e;
            border-bottom: none;
            padding: 12px 16px;
        }
        
        .totals-line.grand .lbl {
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .totals-line.grand .val {
            color: #FFD700;
            font-weight: 800;
            font-size: 14px;
        }
        /* Words */
        
        .inv-words {
            margin-top: 20px;
            padding: 14px 16px;
            background: #f8f9fc;
            border-radius: 7px;
            border-left: 3px solid #1a1a2e;
        }
        
        .inv-words p {
            font-size: 12px;
            color: #5a6070;
            line-height: 1.6;
        }
        
        .inv-words .word-label {
            font-weight: 700;
            color: #1a1a2e;
            text-transform: uppercase;
            font-size: 10.5px;
            letter-spacing: 0.6px;
            display: block;
            margin-bottom: 4px;
        }
        
        .inv-words .pin-line {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #edf0f7;
            font-size: 12px;
            color: #5a6070;
        }
        
        .inv-words .pin-line strong {
            color: #1a1a2e;
        }
        /* Payment details */
        
        .inv-payment {
            margin-top: 18px;
            border: 1px solid #edf0f7;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .inv-payment-header {
            background: #f0f2f7;
            padding: 9px 16px;
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #8892a4;
        }
        
        .inv-payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 14px 16px;
            gap: 8px 24px;
        }
        
        .pay-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .pay-row .pay-label {
            font-size: 10.5px;
            color: #aab2c0;
            font-weight: 500;
        }
        
        .pay-row .pay-val {
            font-size: 12.5px;
            font-weight: 600;
            color: #1a1a2e;
        }
        /* Note */
        
        .inv-note {
            margin-top: 16px;
            padding: 11px 14px;
            background: #fffbea;
            border: 1px solid #ffe58f;
            border-radius: 6px;
            font-size: 11.5px;
            color: #7a6010;
        }
        
        .inv-note strong {
            color: #5a4500;
        }
        /* ===== APPROVER SECTION ===== */
        
        .inv-approver {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid #f0f2f7;
        }
        
        .inv-approver-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #8892a4;
            margin-bottom: 18px;
        }
        
        .approver-fields {
            display: grid;
            grid-template-columns: 1fr 1fr 1.4fr;
            gap: 0 32px;
        }
        
        .approver-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .approver-field .af-label {
            font-size: 11px;
            font-weight: 600;
            color: #5a6070;
        }
        
        .approver-field .af-line {
            border-bottom: 1.5px solid #b0b8cc;
            height: 28px;
            width: 100%;
        }
        
        .approver-field.sig .af-line {
            height: 44px;
        }
        /* Footer */
        
        .inv-ftr {
            width: 100%;
            margin-top: 28px;
            display: block;
        }
        
        .inv-ftr img {
            width: 100%;
            display: block;
        }
        /* ===== PRINT ===== */
        
        @media print {
            body {
                background: #fff;
            }
            .app-bar,
            .form-panel,
            .preview-bar,
            .workspace {
                display: block !important;
            }
            .app-bar,
            .form-panel,
            .preview-bar {
                display: none !important;
            }
            .workspace {
                margin: 0;
                padding: 0;
                display: block;
            }
            .preview-panel {
                box-shadow: none;
                border-radius: 0;
            }
            .preview-canvas {
                padding: 0;
                background: #fff;
            }
            .invoice-doc {
                box-shadow: none;
                max-width: 100%;
            }
        }
    </style>
</head>

        const BANK = {
            mpesa: '309999',
            acName: 'Your Name',
            coName: 'Little Limited',
            bank: 'Commercial Bank of Africa (CBA), Westlands Branch',
            accNo: '8050060011',
        };

        let ic = 0;

        function addItem(desc = '', qty = '', rate = '') {
            ic++;
            const id = ic;
            const wrap = document.getElementById('lineItems');
            const el = document.createElement('div');
            el.className = 'line-item';
            el.id = 'li-' + id;
            el.innerHTML = `
    <input type="text"   placeholder="Description" value="${escQ(desc)}" oninput="liveUpdate()">
    <input type="number" placeholder="1"   value="${qty}"  min="1" style="text-align:center" oninput="liveUpdate()">
    <input type="number" placeholder="0"   value="${rate}" min="0" style="text-align:right"  oninput="liveUpdate()">
    <button class="remove-btn" onclick="removeItem(${id})">×</button>
  `;
            wrap.appendChild(el);
            liveUpdate();
        }

        function escQ(s) {
            return s.replace(/"/g, '&quot;');
        }

        function removeItem(id) {
            const el = document.getElementById('li-' + id);
            if (el) {
                el.remove();
                liveUpdate();
            }
        }

        function getItems() {
            return Array.from(document.querySelectorAll('.line-item')).map(row => {
                const ins = row.querySelectorAll('input');
                return {
                    desc: ins[0].value.trim(),
                    qty: parseFloat(ins[1].value) || 0,
                    rate: parseFloat(ins[2].value) || 0
                };
            }).filter(i => i.desc || i.rate > 0);
        }

        function fmt(n) {
            return Number(n).toLocaleString('en-KE', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        const ONES = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten',
            'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'
        ];
        const TENS = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

        function spellNum(n) {
            if (n === 0) return '';
            if (n < 20) return ONES[n] + ' ';
            if (n < 100) return TENS[Math.floor(n / 10)] + (n % 10 ? ' ' + ONES[n % 10] : '') + ' ';
            if (n < 1000) return ONES[Math.floor(n / 100)] + ' Hundred ' + spellNum(n % 100);
            if (n < 1000000) return spellNum(Math.floor(n / 1000)) + 'Thousand ' + spellNum(n % 1000);
            return spellNum(Math.floor(n / 1000000)) + 'Million ' + spellNum(n % 1000000);
        }

        function toWords(n) {
            const i = Math.floor(n),
                c = Math.round((n - i) * 100);
            let r = (spellNum(i) || 'Zero').trim() + ' Kenyan Shillings';
            if (c > 0) r += ' and ' + spellNum(c).trim() + ' Cents';
            return r;
        }

        function fmtDate(v) {
            if (!v) return '';
            const d = new Date(v + 'T00:00:00');
            return d.toLocaleDateString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: '2-digit'
            });
        }

        function buildHTML() {
            const client = document.getElementById('clientName').value.trim() || '—';
            const loc = document.getElementById('clientLoc').value.trim();
            const invNo = document.getElementById('invNo').value.trim() || '—';
            const date = fmtDate(document.getElementById('invDate').value);
            const pin = document.getElementById('pinNo').value.trim();
            const items = getItems();

            const sub = items.reduce((s, i) => s + i.qty * i.rate, 0);
            const vat = sub * 0.16;
            const total = sub + vat;

            const rows = items.length ?
                items.map(i => `
        <tr>
          <td class="desc">${esc(i.desc)}</td>
          <td class="r">${i.qty}</td>
          <td class="r">KES ${fmt(i.rate)}</td>
          <td class="r">KES ${fmt(i.qty*i.rate)}</td>
        </tr>`).join('') :
                `<tr><td colspan="4" style="text-align:center;color:#aab2c0;padding:22px 14px;font-size:12px">No items - add line items in the form</td></tr>`;

            return `
  <div class="invoice-doc" id="invPrint">
    <div class="inv-hdr"><img src="${HEADER}" alt=""></div>
    <div class="inv-body-wrap">
      <img class="inv-watermark" src="${LOGO}" alt="">
      <div class="inv-content">

        <!-- Meta -->
        <div class="inv-meta">
          <div class="inv-to">
            <p>Bill To</p>
            <div class="client-name">${esc(client)}</div>
            ${loc ? `<div class="client-loc">${esc(loc)}</div>` : ''}
          </div>
          <div class="inv-ref-block">
            <div class="inv-label">Quotation</div>
            <table class="inv-ref-table">
              <tr><td>Quotation No.</td><td>${esc(invNo)}</td></tr>
              <tr><td>Date</td><td>${date||'—'}</td></tr>
            </table>
          </div>
        </div>

        <!-- Items Table -->
        <table class="inv-items-table">
          <thead>
            <tr>
              <th>Description</th>
              <th class="r">Qty</th>
              <th class="r">Unit Rate</th>
              <th class="r">Amount</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>

        <!-- Totals -->
        <div class="inv-totals-row">
          <div class="inv-totals-inner">
            <div class="totals-line"><span class="lbl">Sub Total</span><span class="val">KES ${fmt(sub)}</span></div>
            <div class="totals-line"><span class="lbl">VAT (16%)</span><span class="val">KES ${fmt(vat)}</span></div>
            <div class="totals-line grand"><span class="lbl">Total Amount</span><span class="val">KES ${fmt(total)}</span></div>
          </div>
        </div>

        <!-- Amount in Words + PIN -->
        <div class="inv-words">
          <span class="word-label">Amount in Words</span>
          <p>${toWords(total)}</p>
          ${pin ? `<p class="pin-line"><strong>PIN No:</strong> ${esc(pin)}</p>` : ''}
        </div>

        <!-- Payment Details -->
        <div class="inv-payment">
          <div class="inv-payment-header">Payment Details</div>
          <div class="inv-payment-grid">
            <div class="pay-row"><span class="pay-label">M-PESA Paybill No.</span><span class="pay-val">${BANK.mpesa}</span></div>
            <div class="pay-row"><span class="pay-label">Acc Name (M-PESA)</span><span class="pay-val">${BANK.acName}</span></div>
            <div class="pay-row"><span class="pay-label">Account Name</span><span class="pay-val">${BANK.coName}</span></div>
            <div class="pay-row"><span class="pay-label">Bank Name</span><span class="pay-val">${BANK.bank}</span></div>
            <div class="pay-row"><span class="pay-label">Account No.</span><span class="pay-val">${BANK.accNo}</span></div>
          </div>
        </div>

        <!-- Note -->
        <div class="inv-note">
          <strong>Note:</strong> The above quoted prices are inclusive of driver fees and fuel.
        </div>

        <!-- Approver -->
        <div class="inv-approver">
          <div class="inv-approver-title">Authorisation &amp; Approval</div>
          <div class="approver-fields">
            <div class="approver-field">
              <span class="af-label">Approver Name</span>
              <div class="af-line"></div>
            </div>
            <div class="approver-field">
              <span class="af-label">Date</span>
              <div class="af-line"></div>
            </div>
            <div class="approver-field sig">
              <span class="af-label">Signature</span>
              <div class="af-line"></div>
            </div>
          </div>
        </div>

      </div><!-- /inv-content -->
    </div><!-- /inv-body-wrap -->
    <div class="inv-ftr"><img src="${FOOTER}" alt=""></div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hasContent() {
  return document.getElementById('clientName').value.trim() ||
         document.getElementById('invNo').value.trim() ||
         getItems().length > 0;
}

function liveUpdate() {
  if (hasContent()) {
    document.getElementById('invoiceOutput').innerHTML = buildHTML();
    document.getElementById('dlBtn').disabled = false;
  }
}

function generateInvoice() {
  document.getElementById('invoiceOutput').innerHTML = buildHTML();
  document.getElementById('dlBtn').disabled = false;
  document.getElementById('invoiceOutput').scrollIntoView({behavior:'smooth',block:'start'});
}

function downloadPDF() {
  const el = document.getElementById('invPrint');
  if (!el) { alert('Generate the invoice first.'); return; }

  const client = document.getElementById('clientName').value.trim() || 'Client';
  const no     = document.getElementById('invNo').value.trim() || 'INV';
  const fname  = `Little_Invoice_${client.replace(/\s+/g,'_')}_${no}.pdf`;

  const btn = document.getElementById('dlBtn');
  btn.textContent = 'Generating…';
  btn.disabled = true;

  html2pdf().set({
    margin:      0,
    filename:    fname,
    image:       { type:'jpeg', quality:0.98 },
    html2canvas: { scale:2, useCORS:true, logging:false },
    jsPDF:       { unit:'mm', format:'a4', orientation:'portrait' },
    pagebreak:   { mode:['avoid-all'] }
  }).from(el).save().then(()=>{
    btn.innerHTML = '↓ Download PDF';
    btn.disabled = false;
  });
}

// Init
document.getElementById('invDate').value = new Date().toISOString().split('T')[0];
addItem();
    </script>
</body>

</html>
